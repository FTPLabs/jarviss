name: Build JARVIS for Windows

  on:
    push:
      branches: [ master, main ]
      tags:
        - 'v*'
    pull_request:
      branches: [ master, main ]
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    build-windows:
      name: Build Windows .exe
      runs-on: windows-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Install Rust toolchain
          uses: dtolnay/rust-toolchain@stable
          with:
            targets: x86_64-pc-windows-msvc

        - name: Cache Rust dependencies
          uses: Swatinem/rust-cache@v2
          with:
            workspaces: ". -> target"

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: frontend/package-lock.json

        - name: Install frontend dependencies
          working-directory: frontend
          run: npm ci

        - name: Build frontend
          working-directory: frontend
          run: |
            npx vite build --mode development --emptyOutDir false || true
            npx vite build

        - name: Build jarvis-app backend
          run: cargo build --release -p jarvis-app

        - name: Verify jarvis-app.exe was built
          run: |
            if (!(Test-Path "target/release/jarvis-app.exe")) {
              Write-Error "jarvis-app.exe was not built! Check cargo build step."
              exit 1
            }
            Write-Host "jarvis-app.exe found at: $(Resolve-Path target/release/jarvis-app.exe)"
            Write-Host "Size: $((Get-Item target/release/jarvis-app.exe).length / 1MB) MB"
          shell: pwsh

        - name: Disable beforeBuildCommand in tauri.conf.json
          shell: node {0}
          run: |
            const fs = require('fs');
            const p = 'crates/jarvis-gui/tauri.conf.json';
            const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
            cfg.build.beforeBuildCommand = '';
            cfg.build.beforeDevCommand = '';
            fs.writeFileSync(p, JSON.stringify(cfg, null, 2));
            console.log('patched tauri.conf.json');

        - name: Install Tauri CLI
          run: cargo install tauri-cli --version "^2" --locked

        - name: Build Tauri app (Windows)
          working-directory: crates/jarvis-gui
          run: cargo tauri build
          env:
            TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

        - name: Upload installer artifact
          uses: actions/upload-artifact@v4
          with:
            name: jarvis-windows-installer
            path: |
              target/release/bundle/nsis/*.exe
              target/release/bundle/msi/*.msi
            if-no-files-found: warn
            retention-days: 30

        - name: Upload portable jarvis-gui.exe
          uses: actions/upload-artifact@v4
          with:
            name: jarvis-windows-portable
            path: target/release/jarvis-gui.exe
            if-no-files-found: warn
            retention-days: 30

        - name: Upload jarvis-app.exe
          uses: actions/upload-artifact@v4
          with:
            name: jarvis-app-portable
            path: target/release/jarvis-app.exe
            if-no-files-found: warn
            retention-days: 30

    release:
      name: Create GitHub Release
      runs-on: ubuntu-latest
      needs: build-windows
      if: startsWith(github.ref, 'refs/tags/v')
      permissions:
        contents: write

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Download Windows installer
          uses: actions/download-artifact@v4
          with:
            name: jarvis-windows-installer
            path: dist/installer

        - name: Download portable GUI
          uses: actions/download-artifact@v4
          with:
            name: jarvis-windows-portable
            path: dist/portable

        - name: Download portable app
          uses: actions/download-artifact@v4
          with:
            name: jarvis-app-portable
            path: dist/app

        - name: List release assets
          run: find dist/ -type f | sort

        - name: Create GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            name: "JARVIS ${{ github.ref_name }}"
            tag_name: ${{ github.ref_name }}
            draft: false
            prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
            generate_release_notes: true
            body: |
              ## JARVIS ${{ github.ref_name }}

              Offline voice assistant — Windows release.

              ### Downloads
              - **JARVIS-Setup-\*.exe** — NSIS installer (recommended)
              - **JARVIS-\*.msi** — MSI installer
              - **jarvis-gui.exe** — portable GUI (no install needed)
              - **jarvis-app.exe** — backend engine only

              ### Requirements
              - Windows 10/11 x64
              - Microphone

              ### First launch
              1. Run the installer or jarvis-gui.exe
              2. Select your microphone in settings
              3. Say **"Jarvis"** to wake the assistant
            files: |
              dist/installer/*.exe
              dist/installer/*.msi
              dist/portable/jarvis-gui.exe
              dist/app/jarvis-app.exe
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  